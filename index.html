    <style>
        body { background-color: #000; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* SUMÁRIO */
        #tela-sumario { padding: 40px; text-align: center; }
        h1.titulo-principal { color: #f39c12; font-size: 50px; margin-bottom: 40px; }
        
        .botao-musica { 
            display: block; width: 90%; max-width: 800px; margin: 15px auto; padding: 25px; 
            font-size: 32px; font-weight: bold; background-color: #222; color: white; 
            border: 3px solid #444; border-radius: 12px; cursor: pointer; transition: 0.3s; 
        }
        .botao-musica:hover { background-color: #f39c12; color: black; border-color: #f39c12; }
        
        /* TELEPROMPTER E CONTROLES */
        #tela-teleprompter { display: none; padding: 180px 20px 400px 20px; } 
        
        #controles { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background-color: rgba(20, 20, 20, 0.98); 
            padding: 15px 30px; box-sizing: border-box;
            border-bottom: 3px solid #f39c12; z-index: 1000; 
            display: flex; flex-direction: column; gap: 15px; 
        }
        
        .linha-controles { display: flex; justify-content: space-between; align-items: center; }
        .grupo-botoes { display: flex; align-items: center; gap: 10px; }
        
        button.controle { font-size: 22px; padding: 12px 20px; cursor: pointer; background-color: #f39c12; color: black; border: none; border-radius: 8px; font-weight: bold; }
        button.controle:hover { filter: brightness(1.2); }
        button.voltar { background-color: #e74c3c; color: white; }
        button.seta { background-color: #3498db; color: white; font-size: 26px; } 
        button.crono-btn { background-color: #2ecc71; color: black; }
        
        /* AVISO DA PRÓXIMA MÚSICA */
        #info-proxima { font-size: 24px; color: #aaa; }
        .destaque-proxima { color: #f39c12; font-weight: bold; font-size: 26px; }
        
        #cronometro-visor { font-size: 30px; font-weight: bold; color: #2ecc71; font-family: monospace; letter-spacing: 2px; }

        /* TEXTO DA MÚSICA */
        #musica-container { max-width: 1200px; margin: 0 auto; }
        #musica-titulo { color: #f39c12; font-size: 60px; text-align: left; border-bottom: 2px dashed #555; padding-bottom: 20px; margin-top: 0; margin-bottom: 30px; }
        #musica-texto { font-size: 48px; line-height: 1.4; white-space: pre-wrap; }
        .acorde { color: #f1c40f; font-weight: bold; font-size: 52px; }
    </style>
</head>

        let musicaAtualIndex = 0; 

        function carregarSumario() {
            const divLista = document.getElementById("lista-musicas");
            divLista.innerHTML = "";
            
            if (typeof repertorio === 'undefined') {
                divLista.innerHTML = "<h2 style='color:red;'>Nenhuma música colada. Cole o conteúdo de repertorio_pronto.txt no código HTML.</h2>";
                return;
            }

            repertorio.forEach((musica, index) => {
                const botao = document.createElement("button");
                botao.className = "botao-musica";
                botao.innerText = musica.titulo; 
                botao.onclick = () => abrirMusica(index);
                divLista.appendChild(botao);
            });
        }

        // ==========================================
        // SISTEMA DE NAVEGAÇÃO DE MÚSICAS
        // ==========================================
        function abrirMusica(index) {
            musicaAtualIndex = index; 
            const musicaEscolhida = repertorio[index];
            
            document.getElementById("musica-titulo").innerText = musicaEscolhida.titulo;
            document.getElementById("musica-texto").innerHTML = musicaEscolhida.letra;
            
            if (index < repertorio.length - 1) {
                let tituloLimpo = repertorio[index + 1].titulo.split(" (Tom:")[0];
                document.getElementById("nome-proxima").innerText = tituloLimpo;
            } else {
                document.getElementById("nome-proxima").innerText = "Fim do Show!";
            }
            
            document.getElementById("tela-sumario").style.display = "none";
            document.getElementById("tela-teleprompter").style.display = "block";
            
            pausar(); 
            window.scrollTo(0, 0); 
        }

        function proximaMusica() {
            if (musicaAtualIndex < repertorio.length - 1) {
                abrirMusica(musicaAtualIndex + 1);
            }
        }

        function musicaAnterior() {
            if (musicaAtualIndex > 0) {
                abrirMusica(musicaAtualIndex - 1);
            }
        }

        function voltarParaSumario() {
            pausar(); 
            document.getElementById("tela-teleprompter").style.display = "none";
            document.getElementById("tela-sumario").style.display = "block";
            window.scrollTo(0, 0);
        }

        // ==========================================
        // SISTEMA DO CRONÓMETRO DO SHOW
        // ==========================================
        let tempoSegundos = 0;
        let cronometroAtivo = false;
        let motorCronometro;

        function toggleCronometro() {
            if (cronometroAtivo) {
                clearInterval(motorCronometro);
                cronometroAtivo = false;
                document.getElementById("btn-crono").innerText = "▶ Retomar";
                document.getElementById("btn-crono").style.backgroundColor = "#f39c12"; 
            } else {
                cronometroAtivo = true;
                document.getElementById("btn-crono").innerText = "⏸ Pausar Relógio";
                document.getElementById("btn-crono").style.backgroundColor = "#e74c3c"; 
                
                motorCronometro = setInterval(() => {
                    tempoSegundos++;
                    atualizarVisorCronometro();
                }, 1000);
            }
        }

        function atualizarVisorCronometro() {
            let horas = Math.floor(tempoSegundos / 3600);
            let minutos = Math.floor((tempoSegundos % 3600) / 60);
            let segundos = tempoSegundos % 60;
            
            let textoFormatado = 
                String(horas).padStart(2, '0') + ":" + 
                String(minutos).padStart(2, '0') + ":" + 
                String(segundos).padStart(2, '0');
                
            document.getElementById("cronometro-visor").innerText = textoFormatado;
        }

        // ==========================================
        // SISTEMA DE ROLAGEM
        // ==========================================
        let rolando = false;
        let velocidade = 2;
        let intervalo;

        function iniciar() {
            if (!rolando) {
                rolando = true;
                intervalo = setInterval(() => {
                    window.scrollBy(0, velocidade); 
                }, 50);
            }
        }

        function pausar() {
            rolando = false;
            clearInterval(intervalo);
        }

        function mudarVelocidade(mudanca) {
            velocidade += mudanca;
            if (velocidade < 1) velocidade = 1; 
            document.getElementById("visorVelocidade").innerText = velocidade;
        }

        carregarSumario();
    </script>
